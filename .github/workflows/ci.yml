name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, test, build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify ESM + CJS resolve from dist/
        run: |
          node -e "import('./dist/index.js').then(m => { if (typeof m.AlphaAI !== 'function') { throw new Error('ESM export missing'); } console.log('ESM import ok'); })"
          node -e "const m = require('./dist/index.cjs'); if (typeof m.AlphaAI !== 'function') { throw new Error('CJS export missing'); } console.log('CJS require ok');"

  integration:
    name: Live integration (optional)
    runs-on: ubuntu-latest
    # Only runs when the repository has an ALPHAI_API_KEY secret configured.
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run live integration tests
        env:
          ALPHAI_API_KEY: ${{ secrets.ALPHAI_API_KEY }}
        run: |
          if [ -z "$ALPHAI_API_KEY" ]; then
            echo "ALPHAI_API_KEY not set — skipping live integration tests."
            exit 0
          fi
          npm run test:integration
